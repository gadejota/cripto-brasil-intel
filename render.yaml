services:
  - type: web
    name: cripto-brasil-intel
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: python server.py
    healthCheckPath: /api/health
    envVars:
      - key: PORT
        value: 8000
      - key: CACHE_TTL
        value: 900
      - key: MAX_ARTICLES
        value: 32
      - key: AUTO_APPROVE
        value: false
      - key: ENVIRONMENT
        value: production
      # Opcional — preencher no dashboard do Render:
      # - key: IG_ACCESS_TOKEN
      #   sync: false
      # - key: IG_USER_ID
      #   sync: false
